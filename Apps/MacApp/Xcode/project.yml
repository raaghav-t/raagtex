name: raagtex
options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
packages:
  LocalPackage:
    path: ../../..
targets:
  raagtex:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ../Sources
      - path: Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: LocalPackage
        product: Core
      - package: LocalPackage
        product: Shared
    settings:
      base:
        PRODUCT_NAME: raagtex
        PRODUCT_BUNDLE_IDENTIFIER: com.raaghavt.raagtex
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: raagtex
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        CODE_SIGN_ENTITLEMENTS: raagtex.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  raagtex:
    build:
      targets:
        raagtex: all
    run:
      config: Debug
    archive:
      config: Release
